name: Build Release

on:
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        outputs:
            version: ${{ steps.version.outputs.version }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  submodules: recursive

            -   name: Setup MSBuild
                uses: microsoft/setup-msbuild@v3

            - name: Generate Auth File
              shell: pwsh
              env:
                  SECRET_KEY: ${{ secrets.MEMO_API_ACT_KEY }}
              run: |
                  $filePath = "${{ github.workspace }}\MemoUploader\Api\ApiSecrets.cs"
                  $content = @"
                  namespace MemoUploader.Api;
                  public class ApiSecrets
                  {
                      public const string AuthKey = "$env:SECRET_KEY";
                  }
                  "@
                  Set-Content -Path $filePath -Value $content

            - name: Restore NuGet packages
              run: nuget restore Plugin.sln

            - name: Build (Release)
              run: msbuild Plugin.sln /p:Configuration=Release

            - name: Read Version
              id: version
              shell: pwsh
              run: |
                  $content = Get-Content MemoUploader/Properties/AssemblyInfo.cs -Raw
                  if ($content -match 'AssemblyVersion\("([^"]+)"\)') {
                    $version = $matches[1]
                    "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
                  } else {
                    throw "AssemblyVersion not found"
                  }

            - name: Pack Release Zip
              id: pack_zip
              shell: pwsh
              run: |
                  $version = "${{ steps.version.outputs.version }}"
                  $releaseDir = "MemoUploader/bin/Release"
                  $zipName = "MemoUploader-v$version.zip"

                  $stagingDir = "staging_temp"
                  New-Item -ItemType Directory -Path $stagingDir -Force

                  $filesToPack = @(
                      "MemoUploader.dll",
                      "System.Threading.Tasks.Dataflow.dll"
                  )

                  foreach ($file in $filesToPack) {
                      $srcPath = Join-Path $releaseDir $file
                      if (Test-Path $srcPath) {
                          Copy-Item $srcPath -Destination $stagingDir
                      }
                  }

                  Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipName

            - name: Create git tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag v${{ steps.version.outputs.version }}
                  git push origin v${{ steps.version.outputs.version }}

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  files: MemoUploader-v*.zip

    dispatch-mirror:
        needs: build
        if: needs.build.result == 'success'
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/create-github-app-token@v2
                id: ops-token
                with:
                    app-id: ${{ secrets.GH_APP_ID }}
                    private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
                    owner: ${{ github.repository_owner }}
                    repositories: 'memo-ops'

            -   uses: peter-evans/repository-dispatch@v3
                with:
                    token: ${{ steps.ops-token.outputs.token }}
                    repository: open-xiv/memo-ops
                    event-type: mirror-memo-uploader-act
                    client-payload: |
                        {
                          "version": "${{ needs.build.outputs.version }}",
                          "commit_msg": ${{ toJSON(github.event.head_commit.message) }},
                          "download_url": "https://github.com/open-xiv/memo-uploader-act/releases/download/v${{ needs.build.outputs.version }}/MemoUploader-v${{ needs.build.outputs.version }}.zip"
                        }

    notify:
        needs: [build]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Compute status
              id: s
              run: |
                  if [[ "${{ needs.build.result }}" == "success" ]]; then
                    echo "status=success" >> "$GITHUB_OUTPUT"
                  else
                    echo "status=failure" >> "$GITHUB_OUTPUT"
                  fi
            - uses: open-xiv/gha-actions/notify-deploy@v1
              with:
                  status: ${{ steps.s.outputs.status }}
                  service: memo-uploader-act
                  kind: release
                  version: v${{ needs.build.outputs.version }}
                  cluster: ''
                  build: ${{ needs.build.result }}
                  webhook_url: ${{ secrets.BOT_WEBHOOK_URL }}
                  webhook_token: ${{ secrets.BOT_WEBHOOK_TOKEN }}
